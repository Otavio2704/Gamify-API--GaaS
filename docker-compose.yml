services:

  # ──────────────────────────────────────────────────────────────────────────
  # Banco de dados PostgreSQL (opcional para desenvolvimento local)
  # Ative com: docker compose --profile local-db up --build
  # ──────────────────────────────────────────────────────────────────────────
  postgres:
    profiles:
      - local-db
    image: postgres:16-alpine
    container_name: gamifyapi-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: gamifyapi
      POSTGRES_USER: gamify
      POSTGRES_PASSWORD: gamify_secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gamify -d gamifyapi"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────────────────────────────────
  # GamifyAPI — Spring Boot Application
  # ──────────────────────────────────────────────────────────────────────────
  gamifyapi:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gamifyapi-app
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      # Banco de dados externo (obrigatório)
      DB_URL: ${DB_URL:?Defina DB_URL para o banco externo}
      DB_USERNAME: ${DB_USERNAME:?Defina DB_USERNAME para o banco externo}
      DB_PASSWORD: ${DB_PASSWORD:?Defina DB_PASSWORD para o banco externo}
      # JWT — TROQUE em produção real!
      JWT_SECRET: "mudar-para-um-secret-forte-com-min-256bits-em-producao-real"
      JWT_EXPIRATION_MS: "86400000"
      # JPA
      DDL_AUTO: validate
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    volumes:
      - ./logs:/app/logs

volumes:
  postgres_data:
    driver: local
